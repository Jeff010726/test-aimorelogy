name: Fetch Latest Headlines

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Fetch headlines
        run: npm run fetch:headlines
        env:
          FEED_URL: ${{ secrets.HEADLINES_FEED_URL }}
          MAX_ITEMS: 12

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/latest-headlines.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/latest-headlines.json
            git commit -m "chore: update latest headlines data"
            git push
          else
            echo "No changes to commit."
          fi
